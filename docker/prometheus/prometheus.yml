global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "krasis-server"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["server:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "krasis-server"
