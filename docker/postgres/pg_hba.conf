# Dev / Docker Desktop: TCP SCRAM from localhost + RFC1918 + full 172.x (some NATs use 172.24.x).
# Unix socket = trust (pg_isready inside container).
# Last lines allow any IPv4/IPv6 client when Postgres only listens on Docker-published ports (dev).
#
# TYPE  DATABASE  USER  ADDRESS           METHOD

local   all       all                     trust
host    all       all       127.0.0.1/32  scram-sha-256
host    all       all       ::1/128       scram-sha-256

host    all       all       10.0.0.0/8        scram-sha-256
host    all       all       172.16.0.0/12     scram-sha-256
host    all       all       172.0.0.0/8       scram-sha-256
host    all       all       192.168.0.0/16    scram-sha-256

local   replication  all                  trust
host    replication  all  127.0.0.1/32     scram-sha-256
host    replication  all  ::1/128          scram-sha-256

# Fallback: Docker port-map / odd client IPs (e.g. 172.24.0.1). Restrict 5432 with firewall in production.
host    all       all       0.0.0.0/0         scram-sha-256
host    all       all       ::/0              scram-sha-256
