name: krasis
description: Krasis intelligent notes system
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.0
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0
  cached_network_image: ^3.3.0
  uuid: ^4.3.0
  flutter_markdown: ^0.7.0
  markdown: ^7.3.0
  shimmer: ^3.0.0
  record: ^4.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  intl: 0.19.0
